# ── JobScheduler
# Drives the cadence of automatic snapshots. The minimum cadence is 60 minutes
# — the controller rejects anything shorter.
#
# Schema: scheduler.nutanix.com/v1alpha1 (NOT dataservices.nutanix.com).
# spec accepts ONE of: cronSchedule (string) | interval | daily | weekly | monthly.
apiVersion: scheduler.nutanix.com/v1alpha1
kind: JobScheduler
metadata:
  name: stateful-demo-hourly
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: ndk-gitops-demo
spec:
  cronSchedule: "${CRON_SCHEDULE}"
