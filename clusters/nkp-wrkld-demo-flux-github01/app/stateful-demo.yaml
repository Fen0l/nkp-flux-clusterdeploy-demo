# ── PersistentVolumeClaim 
# 1 Gi on the default StorageClass (nutanix-volume).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stateful-demo-data
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: stateful-demo
    app.kubernetes.io/instance: stateful-demo
    app.kubernetes.io/part-of: ndk-gitops-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: ${PVC_SIZE}
---
# ── Deployment 
# Single replica writes a timestamped line to /data/log.txt every 5 seconds.
# The line count is the proof point: snapshot freezes a known count, restore
# brings the file back at that exact count.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateful-demo
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: stateful-demo
    app.kubernetes.io/instance: stateful-demo
    app.kubernetes.io/part-of: ndk-gitops-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: stateful-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stateful-demo
        app.kubernetes.io/instance: stateful-demo
        app.kubernetes.io/part-of: ndk-gitops-demo
    spec:
      containers:
        - name: writer
          image: docker.io/library/busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              touch /data/log.txt
              while true; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)  tick" >> /data/log.txt
                sleep 5
              done
          resources:
            requests: { cpu: 10m,  memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stateful-demo-data
---
# ── Headless Service 
# Used only for kubectl exec discovery — no inbound traffic in the demo.
apiVersion: v1
kind: Service
metadata:
  name: stateful-demo
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: stateful-demo
    app.kubernetes.io/instance: stateful-demo
    app.kubernetes.io/part-of: ndk-gitops-demo
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/instance: stateful-demo
  ports:
    - port: 80
      targetPort: 80
