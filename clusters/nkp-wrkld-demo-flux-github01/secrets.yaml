# ── Prism Central credentials 
# All ${VAR} placeholders are injected by Flux postBuild.substituteFrom
# from a K8s Secret on the management cluster. They NEVER appear in Git.
apiVersion: v1
kind: Secret
metadata:
  name: nkp-wrkld-demo-flux-github01-pc-credentials
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    cluster.x-k8s.io/provider: nutanix
    konvoy.d2iq.io/cluster-name: nkp-wrkld-demo-flux-github01
    konvoy.d2iq.io/provider: nutanix
type: Opaque
stringData:
  credentials: |
    [
      {
        "type": "basic_auth",
        "data": {
          "prismCentral": {
            "username": "${PC_USER}",
            "password": "${PC_PASSWORD}"
          }
        }
      }
    ]
---
# ── CSI credentials 
apiVersion: v1
kind: Secret
metadata:
  name: nkp-wrkld-demo-flux-github01-pc-credentials-for-csi
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    cluster.x-k8s.io/provider: nutanix
    konvoy.d2iq.io/cluster-name: nkp-wrkld-demo-flux-github01
    konvoy.d2iq.io/provider: nutanix
type: Opaque
stringData:
  key: "${PC_ENDPOINT}:9440:${PC_USER}:${PC_PASSWORD}"
---
# ── Konnector credentials 
apiVersion: v1
kind: Secret
metadata:
  name: nkp-wrkld-demo-flux-github01-pc-credentials-for-konnector-agent
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    cluster.x-k8s.io/provider: nutanix
    konvoy.d2iq.io/cluster-name: nkp-wrkld-demo-flux-github01
    konvoy.d2iq.io/provider: nutanix
type: Opaque
stringData:
  username: "${PC_USER}"
  password: "${PC_PASSWORD}"
---
# ── Harbor registry mirror credentials + CA
# CAREN globalImageRegistryMirror.credentials.secretRef reads `username`,
# `password`, and `ca.crt` from this same Secret. With ca.crt present, the
# CA is distributed to every node and added to containerd's hosts.toml
# automatically — no DaemonSet, no skip_verify needed.
