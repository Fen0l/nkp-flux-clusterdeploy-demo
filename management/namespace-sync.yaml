# ── ServiceAccount for Flux Kustomizations + namespace-sync Job 
# Used by both Flux (to apply workspace/cluster resources) and the
# namespace-sync Job (to patch the ConfigMap with the real namespace).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-deployer
  namespace: flux-clusters-lh5x6
---
# ── ClusterRole: create workspaces, clusters, secrets 
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-deployer
rules:
  # Workspace CRs (cluster-scoped)
  - apiGroups: ["workspaces.kommander.mesosphere.io"]
    resources: ["workspaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # CAPI Cluster CRs
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Secrets (companion secrets in workspace namespace)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # ConfigMaps (for namespace-sync patching)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-deployer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-deployer
subjects:
  - kind: ServiceAccount
    name: flux-deployer
    namespace: flux-clusters-lh5x6
---
# ── One-shot Job: patches ConfigMap with the real workspace namespace 
apiVersion: batch/v1
kind: Job
metadata:
  name: namespace-sync-nkp-wrkld-demo-flux-github01
  namespace: flux-clusters-lh5x6
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: flux-deployer
      containers:
        - name: sync
          image: docker.io/alpine/k8s:1.34.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for workspace flux-demo-github..."
              until NS=$(kubectl get workspace flux-demo-github \
                -o jsonpath='{.status.namespaceRef.name}' 2>/dev/null) \
                && [ -n "$NS" ]; do
                sleep 5
              done
              echo "Namespace: $NS"
              kubectl -n flux-clusters-lh5x6 patch configmap \
                nkp-wrkld-demo-flux-github01-config \
                --type merge \
                -p "{\"data\":{\"WORKSPACE_NAMESPACE\":\"$NS\"}}"
              echo "Done — WORKSPACE_NAMESPACE=$NS"
      restartPolicy: OnFailure
