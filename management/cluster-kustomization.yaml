# ── Phase 1: Create the Workspace 
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-demo-workspace
  namespace: flux-clusters-lh5x6
spec:
  interval: 10m
  retryInterval: 1m
  serviceAccountName: flux-deployer
  sourceRef:
    kind: GitRepository
    name: flux-clusterdeploy-demo
  path: ./workspace
  prune: false
  wait: true
  timeout: 5m
---
# ── Phase 2a: Create companion Secrets in workspace namespace 
# Must exist BEFORE the Cluster CR — the CAREN preflight webhook validates
# PC connectivity using these secrets during dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nkp-wrkld-demo-flux-github01-secrets
  namespace: flux-clusters-lh5x6
spec:
  dependsOn:
    - name: flux-demo-workspace
  interval: 10m
  retryInterval: 1m
  serviceAccountName: flux-deployer
  sourceRef:
    kind: GitRepository
    name: flux-clusterdeploy-demo
  path: ./clusters/nkp-wrkld-demo-flux-github01
  prune: false
  wait: true
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: nkp-wrkld-demo-flux-github01-config
        optional: false
      - kind: Secret
        name: nkp-wrkld-demo-flux-github01-secrets
        optional: false
---
# ── Phase 2b: Deploy the Cluster CR 
# Depends on 2a — companion secrets must exist for preflight validation.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nkp-wrkld-demo-flux-github01
  namespace: flux-clusters-lh5x6
spec:
  dependsOn:
    - name: nkp-wrkld-demo-flux-github01-secrets
  interval: 10m
  retryInterval: 2m
  serviceAccountName: flux-deployer
  sourceRef:
    kind: GitRepository
    name: flux-clusterdeploy-demo
  path: ./clusters/nkp-wrkld-demo-flux-github01/cluster
  prune: false
  wait: false
  timeout: 30m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: nkp-wrkld-demo-flux-github01-config
        optional: false
      - kind: Secret
        name: nkp-wrkld-demo-flux-github01-secrets
        optional: false
