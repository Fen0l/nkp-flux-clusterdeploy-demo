# ── GitHub Actions: Sync secrets + config to NKP management cluster ──────────
#
# Reads from GitHub repo Settings > Secrets and creates:
#   - ConfigMap: nkp-wrkld-demo-flux-github01-config (non-sensitive)
#   - Secret:    nkp-wrkld-demo-flux-github01-secrets (credentials)
#
# Note: WORKSPACE_NAMESPACE is NOT set here — it is auto-populated by the
#       namespace-sync Job (Phase 1.5) after Flux creates the workspace.
#
# Prerequisites:
#   - Self-hosted runner on the cluster network (air-gapped)
#   - GitHub repo secrets configured (see below)
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   KUBECONFIG_BASE64        - base64-encoded kubeconfig for the mgmt cluster
#   PC_ENDPOINT              - Prism Central IP
#   PC_USER                  - Prism Central username
#   PC_PASSWORD              - Prism Central password
#   PE_CLUSTER               - Prism Element cluster name
#   SUBNET                   - AHV subnet name
#   STORAGE_CONTAINER        - Nutanix storage container name
#   VM_IMAGE                 - Node OS image name
#   CONTROL_PLANE_VIP        - Control plane virtual IP
#   LB_IP_START              - MetalLB pool start
#   LB_IP_END                - MetalLB pool end
#   SSH_PUBLIC_KEY           - SSH public key for node access
#   REGISTRY_MIRROR_URL      - Air-gapped registry URL
#   HARBOR_USER              - Registry mirror username
#   HARBOR_PASSWORD          - Registry mirror password
#
name: Sync Cluster Secrets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clusters/**'

jobs:
  sync-secrets:
    runs-on: self-hosted

    steps:
      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_DATA}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create/update ConfigMap (non-sensitive)
        env:
          PC_ENDPOINT: ${{ secrets.PC_ENDPOINT }}
          PE_CLUSTER: ${{ secrets.PE_CLUSTER }}
          SUBNET: ${{ secrets.SUBNET }}
          STORAGE_CONTAINER: ${{ secrets.STORAGE_CONTAINER }}
          VM_IMAGE: ${{ secrets.VM_IMAGE }}
          CONTROL_PLANE_VIP: ${{ secrets.CONTROL_PLANE_VIP }}
          LB_IP_START: ${{ secrets.LB_IP_START }}
          LB_IP_END: ${{ secrets.LB_IP_END }}
          REGISTRY_MIRROR_URL: ${{ secrets.REGISTRY_MIRROR_URL }}
        run: |
          # WORKSPACE_NAMESPACE is auto-populated by the namespace-sync Job.
          # Initialize with placeholder — the Job patches it after workspace creation.
          kubectl create configmap nkp-wrkld-demo-flux-github01-config \
            --namespace=kommander \
            --from-literal=WORKSPACE_NAMESPACE="pending-namespace-sync" \
            --from-literal=PC_ENDPOINT="${PC_ENDPOINT}" \
            --from-literal=PE_CLUSTER="${PE_CLUSTER}" \
            --from-literal=SUBNET="${SUBNET}" \
            --from-literal=STORAGE_CONTAINER="${STORAGE_CONTAINER}" \
            --from-literal=VM_IMAGE="${VM_IMAGE}" \
            --from-literal=CONTROL_PLANE_VIP="${CONTROL_PLANE_VIP}" \
            --from-literal=LB_IP_START="${LB_IP_START}" \
            --from-literal=LB_IP_END="${LB_IP_END}" \
            --from-literal=REGISTRY_MIRROR_URL="${REGISTRY_MIRROR_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update Secret (credentials)
        env:
          PC_USER: ${{ secrets.PC_USER }}
          PC_PASSWORD: ${{ secrets.PC_PASSWORD }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          kubectl create secret generic nkp-wrkld-demo-flux-github01-secrets \
            --namespace=kommander \
            --from-literal=PC_USER="${PC_USER}" \
            --from-literal=PC_PASSWORD="${PC_PASSWORD}" \
            --from-literal=SSH_PUBLIC_KEY="${SSH_PUBLIC_KEY}" \
            --from-literal=HARBOR_USER="${HARBOR_USER}" \
            --from-literal=HARBOR_PASSWORD="${HARBOR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify
        run: |
          kubectl get configmap nkp-wrkld-demo-flux-github01-config -n kommander && echo "ConfigMap OK"
          kubectl get secret nkp-wrkld-demo-flux-github01-secrets -n kommander && echo "Secret OK"

      - name: Trigger Flux reconciliation
        run: |
          kubectl annotate gitrepository flux-clusterdeploy-demo -n kommander \
            reconcile.fluxcd.io/requestedAt="$(date +%s)" --overwrite 2>/dev/null || true

      - name: Clean up kubeconfig
        if: always()
        run: rm -f ~/.kube/config
